apiVersion: apps/v1
kind: Deployment

metadata:
  name: elysia-app
  labels:
    app: elysia-app
    component: backend-api
    stack: learn-bun-elysia

spec:
  replicas: 1
  selector:
    matchLabels:
      component: backend-api

  template:
    metadata:
      labels:
        app: elysia-app
        component: backend-api
        stack: learn-bun-elysia

    spec:
      nodeSelector:
        workload: elysia-app

      containers:
        - name: elysia-app
          image: learn-bun-elysia
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: '3000'
          envFrom:
            - configMapRef:
              name: elysia-app-config
            - secretRef:
              name: elysia-app-secret
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

      initContainers:
        - name: elysia-app-migration
          image: elysia-app
          command: [sh, -c, server migrate]
          envFrom:
            - secretRef:
              name: elysia-app-secret

      imagePullSecrets:
        - name: staging-ghcr-secret

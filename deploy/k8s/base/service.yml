apiVersion: v1
kind: Service

metadata:
  name: elysia-app
  labels:
    app: elysia-app
    component: backend-api
    stack: learn-bun-elysia

spec:
  type: NodePort # or ClusterIP
  selector:
    app: elysia-app
  ports:
    - name: http
      port: 80          # The port the app listens on inside the cluster
      targetPort: 3000  # The port your Bun/Node container is using
      nodePort: 30001   # The port opened on your VPS (accessible via Pangolin)
      protocol: TCP

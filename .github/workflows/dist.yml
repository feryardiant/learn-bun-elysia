name: Distribute
run-name: "dist(${{ github.event.workflow_run.head_branch }}): docker build for `${{ github.event.workflow_run.head_sha }}`"

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare
    if: github.event.workflow_run.conclusion == 'success'
    uses: projek-xyz/actions/.github/workflows/prepare.yml@main

    permissions:
      contents: read
      pull-requests: write

  docker:
    name: Build Docker Images
    needs: prepare
    if: needs.prepare.outputs.should-build == '1'
    uses: projek-xyz/actions/.github/workflows/docker.yml@main
    with:
      build-args: |
        BUN_VERSION=${{ vars.BUN_VERSION || '1.3.10' }}
        BASE_OS=alpine
        APP_NAME=elysia-app
        APP_VERSION=${{ needs.prepare.outputs.project-version }}
      docker-file: deploy/docker/elysia-app.dockerfile
      image-tag: ${{ needs.prepare.outputs.project-version }}
      image-slug: ${{ needs.prepare.outputs.branch-slug }}
      image-labels: |
        org.opencontainers.image.author=${{ github.repository_owner }}
        org.opencontainers.image.licenses=MIT

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

  api-schema:
    name: API Schema Artifact
    if: github.event_name != 'pull_request' || needs.prepare.outputs.pr-number == ''
    needs: [prepare, docker]
    runs-on: ubuntu-latest
    outputs:
      artifact-id: ${{ steps.api-schema.outputs.artifact-id }}

    permissions:
      packages: read

    env:
      DB_NAME: ${{ github.repository_owner }}
      DB_USER: ${{ github.repository_owner }}
      DB_PASS: secret
      BUN_VERSION: ${{ vars.BUN_VERSION || '1.3.10' }}

    services:
      postgres:
        image: postgres:${{ vars.DB_VERSION || '17.7' }}
        env:
          POSTGRES_DB: ${{ env.DB_NAME }}
          POSTGRES_USER: ${{ env.DB_USER }}
          POSTGRES_PASSWORD: ${{ env.DB_PASS }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd=pg_isready
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      app:
        image: ${{ needs.docker.outputs.image-url }}
        credentials:
          username: ${{ github.actor }}
          password: ${{ github.token }}
        env:
          NODE_ENV: staging
          APP_SECRET: not-secure-secret
          LOG_LEVEL: debug
          DB_HOST: postgres
          DB_NAME: ${{ env.DB_NAME }}
          DB_USER: ${{ env.DB_USER }}
          DB_PASS: ${{ env.DB_PASS }}
        ports:
          - 3000:3000

    steps:
      - name: Set up bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Generate API schema
        env:
          APP_URL: http://localhost:${{ job.services.app.ports['3000'] }}
        run: |
          bunx openapi-typescript $APP_URL/docs/json -o elysia-app.schema.d.ts

      - name: Upload schema artifacts
        id: api-schema
        uses: actions/upload-artifact@v7
        with:
          name: api-schema_${{ needs.prepare.outputs.branch-slug }}
          path: elysia-app.schema.d.ts
          retention-days: 30
          overwrite: true

  stress-test:
    name: Stress Test
    if: github.event_name != 'pull_request' || needs.prepare.outputs.pr-number == ''
    needs: [prepare, docker]
    runs-on: ubuntu-latest

    permissions:
      packages: read

    env:
      DB_NAME: ${{ github.repository_owner }}
      DB_USER: ${{ github.repository_owner }}
      DB_PASS: secret

    services:
      postgres:
        image: postgres:${{ vars.DB_VERSION || '17.7' }}
        env:
          POSTGRES_DB: ${{ env.DB_NAME }}
          POSTGRES_USER: ${{ env.DB_USER }}
          POSTGRES_PASSWORD: ${{ env.DB_PASS }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd=pg_isready
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
      app:
        image: ${{ needs.docker.outputs.image-url }}
        credentials:
          username: ${{ github.actor }}
          password: ${{ github.token }}
        env:
          NODE_ENV: staging
          APP_SECRET: not-secure-secret
          LOG_LEVEL: debug
          DB_HOST: postgres
          DB_NAME: ${{ env.DB_NAME }}
          DB_USER: ${{ env.DB_USER }}
          DB_PASS: ${{ env.DB_PASS }}
        ports:
          - 3000:3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 load test
        env:
          APP_URL: http://localhost:${{ job.services.app.ports['3000'] }}
        run: |
          k6 run scripts/throughput.ts --summary-export=load-performance.json

      - name: Create Summary
        if: always()
        run: |
          echo "### Load Test Results 🚀" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Requests | $(jq .metrics.http_reqs.count load-performance.json) |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed Requests | $(jq .metrics.http_req_failed.count load-performance.json) |" >> $GITHUB_STEP_SUMMARY
          echo "| Avg Duration | $(jq .metrics.http_req_duration.avg load-performance.json)ms |" >> $GITHUB_STEP_SUMMARY
          echo "| P95 Duration | $(jq '.metrics.http_req_duration["p(95)"]' load-performance.json)ms |" >> $GITHUB_STEP_SUMMARY

name: Deploy
run-name: 'Deploy `${{ github.ref_name }}` to ${{ inputs.environment }}'

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment for deployment"
        default: development
        type: choice
        options:
          - development
          - staging

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare
    uses: ./.github/workflows/prepare.yml
    secrets: inherit

    permissions:
      contents: read
      actions: read

  docker:
    name: Docker Images for elysia-app
    needs: [prepare]
    uses: ./.github/workflows/docker.yml
    with:
      buildable: ${{ needs.prepare.outputs.buildable == '1' }}
      image-name: elysia-app
      image-prefix: ${{ needs.prepare.outputs.image-prefix }}
      image-tag: ${{ needs.prepare.outputs.image-tag }}
      repo-name: ${{ needs.prepare.outputs.repo-name }}

    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

  secrets:
    name: Sync Secrets
    # if: ${{ needs.prepare.outputs.deployable == '1' }}
    needs: [prepare]
    runs-on: ubuntu-latest

    environment:
      name: ${{ needs.prepare.outputs.deploy-env }}

    env:
      NAMESPACE: ${{ needs.prepare.outputs.deploy-env }}

    steps:
      - name: Set up Kubectl
        uses: Azure/setup-kubectl@v5
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_DATA }}

      - name: Set up Kubeconfig
        uses: azure/k8s-set-context@4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG_DATA }}

      - name: Sync deployment image pull secrets
        run: |
          kubectl create secret docker-registry staging-ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ secrets.DEPLOY_USER }} \
            --docker-password=${{ secrets.DEPLOY_PAT }} \
            --namespace="$NAMESPACE" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Sync application secrets
        run: |
          kubectl create configmap elysia-app-config \
            --from-literal=key1=config1 \
            --namespace="$NAMESPACE" \
            --dry-run=client -o yaml | kubectl apply -f -
